# This is the development compose file, so it only defines the database service.

services:
  db:
    image: postgres:18-trixie
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_DB: samadb
      POSTGRES_USER: sama
      POSTGRES_PASSWORD: sama-dev-pw
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - 5432:5432

volumes:
  pgdata:
