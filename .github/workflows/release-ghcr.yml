name: Release to GHCR

defaults:
  run:
    shell: bash

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  TAG_NAME: ghcr.io/sep/sama

on:
  push:
    tags:
      - 'v*'

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.minver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install MinVer CLI
        run: dotnet tool install --global minver-cli --version 6.0.0

      - name: Get version from MinVer
        id: minver
        run: |
          VERSION=$(minver -t v)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Calculated version: $VERSION"

  release_docker:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: standard
            dockerfile: ./Dockerfile-buildx-amd64
            suffix: ""
            title: "SAMA"
            description: "Service Availability Monitoring and Alerting - A modern uptime monitoring system"
          - variant: sudo
            dockerfile: ./Dockerfile-buildx-amd64.sudo
            suffix: "-sudo"
            title: "SAMA (sudo)"
            description: "Service Availability Monitoring and Alerting - A modern uptime monitoring system (with sudo)"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.TAG_NAME }}
          tags: |
            type=semver,pattern={{version}}${{ matrix.suffix }},value=${{ needs.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}}${{ matrix.suffix }},value=${{ needs.version.outputs.version }},enable=${{ !contains(needs.version.outputs.version, '-') }}
            type=raw,value=latest${{ matrix.suffix }},enable=${{ !contains(needs.version.outputs.version, '-') }}
            type=raw,value=unstable${{ matrix.suffix }},enable=${{ contains(needs.version.outputs.version, '-') }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.vendor=SEP
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
