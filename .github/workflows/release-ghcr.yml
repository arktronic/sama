name: Release to GHCR

defaults:
  run:
    shell: bash

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  TAG_NAME: ghcr.io/sep/sama

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release_docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install MinVer CLI
        run: dotnet tool install --global minver-cli --version 6.0.0

      - name: Get version from MinVer
        id: minver
        run: |
          VERSION=$(minver -t v)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Calculated version: $VERSION"

      - name: Set tags
        id: set_tags
        run: |
          VERSION="${{ steps.minver.outputs.version }}"
          ALL_TAGS="$TAG_NAME:$VERSION"
          
          # Add 'latest' tag only for version tags (v*) that are stable releases (no pre-release suffix)
          if [[ "${{ github.ref }}" == refs/tags/v* ]] && [[ ! "$VERSION" =~ - ]]; then
            ALL_TAGS="$ALL_TAGS,$TAG_NAME:latest"
          fi
          
          echo "tags=$ALL_TAGS" >> $GITHUB_OUTPUT
          echo "Setting tags to: $ALL_TAGS"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile-buildx-amd64
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          provenance: false
          push: false
          tags: ${{ steps.set_tags.outputs.tags }}
          build-args: |
            VERSION=${{ steps.minver.outputs.version }}
