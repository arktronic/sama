name: Release to GHCR

defaults:
  run:
    shell: bash

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  TAG_NAME: ghcr.io/sep/sama

on:
  push:
    tags:
      - 'v*'

jobs:
  release_docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install MinVer CLI
        run: dotnet tool install --global minver-cli --version 6.0.0

      - name: Get version from MinVer
        id: minver
        run: |
          VERSION=$(minver -t v)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Calculated version: $VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.TAG_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.minver.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.minver.outputs.version }},enable=${{ !contains(steps.minver.outputs.version, '-') }}
            type=raw,value=latest,enable=${{ !contains(steps.minver.outputs.version, '-') }}
          labels: |
            org.opencontainers.image.title=SAMA
            org.opencontainers.image.description=Service Availability Monitoring and Alerting - A modern uptime monitoring system
            org.opencontainers.image.vendor=SEP
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile-buildx-amd64
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            VERSION=${{ steps.minver.outputs.version }}
