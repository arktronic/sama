name: CI

defaults:
  run:
    shell: bash

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  linux_unit_tests:
    name: Unit Tests on Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Run unit tests
        run: dotnet test SAMA.Tests.Unit/

  linux_integration_tests:
    name: Integration Tests on Linux
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: samadb
          POSTGRES_USER: sama
          POSTGRES_PASSWORD: sama-test-pw
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: samadb
      POSTGRES_USER: sama
      POSTGRES_PASSWORD: sama-test-pw
      SAMA_ENCRYPTION_KEY: test-encryption-key-for-ci-only

    steps:
      - uses: actions/checkout@v4
      - name: Set up dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Run integration tests
        run: dotnet test SAMA.Tests.Integration/

  linux_system_tests:
    name: System Tests on Linux
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: samadb
          POSTGRES_USER: sama
          POSTGRES_PASSWORD: sama-test-pw
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      smtp:
        image: rnwood/smtp4dev:v3
        env:
          ServerOptions__Urls: http://*:80
        ports:
          - 6467:80
          - 6468:25

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: samadb
      POSTGRES_USER: sama
      POSTGRES_PASSWORD: sama-test-pw
      SAMA_ENCRYPTION_KEY: test-encryption-key-for-ci-only

    steps:
      - uses: actions/checkout@v4
      - name: Set up dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Build
        run: dotnet build SAMA.Tests.System/
      - name: Install Playwright browsers
        run: pwsh SAMA.Tests.System/bin/Debug/net10.0/playwright.ps1 install chromium
      - name: Run system tests
        env:
          RUN_SYSTEM_TESTS: 'true'
        run: |
          cd SAMA.Tests.System
          dotnet test --logger "console;verbosity=detailed"

  docker_build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t sama:ci-test .
